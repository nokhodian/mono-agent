<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 600;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      font-weight: 500;
    }
    .url-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
      font-family: monospace;
    }
    button {
      margin-top: 8px;
      padding: 6px 12px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #1d4ed8; }
    .saved-msg {
      color: #22c55e;
      font-size: 11px;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <h3>Monoes Agent</h3>
  <div class="status-row">
    <div id="dot" class="dot disconnected"></div>
    <span id="status-text" class="status-text">Checking...</span>
  </div>
  <div class="url-section">
    <label for="ws-url">WebSocket URL</label>
    <input type="text" id="ws-url" placeholder="ws://127.0.0.1:9222/monoes" />
    <button id="save-btn">Save &amp; Reconnect</button>
    <div id="saved-msg" class="saved-msg">Saved and reconnecting...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
